name: Validate version file

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate storage/app/version.json
        run: |
          if [ ! -f storage/app/version.json ]; then
            echo "ERROR: storage/app/version.json is missing. Add and commit it manually."
            exit 1
          fi
          python3 -m json.tool storage/app/version.json > /dev/null && echo "version.json is valid JSON"
